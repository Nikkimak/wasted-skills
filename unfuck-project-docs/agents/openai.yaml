interface:
  display_name: "Unfuck Project Docs"
  short_description: "Untangle project docs and workspace structure"
  default_prompt: "Use $unfuck-project-docs to inspect whether this project actually needs one-time structural adoption, migration, or cleanup first; if it does, keep the bundled references read-only, determine and explicitly confirm the repo model, decide and ask which documentation strategy to use for any existing docs, ask whether to create the recommended preflight backup, and produce a compact approval request with mandatory fields. Then stop and wait for the user's reply. Do not create, edit, rename, move, or delete project files before that reply. After approval, create the approved preflight backup before the first mutation, and only then reorganize the project's docs and workspace structure using the canonical playbook."
