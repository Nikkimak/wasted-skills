interface:
  display_name: "Unfuck Project Docs"
  short_description: "Untangle project docs and workspace structure"
  default_prompt: "Use $unfuck-project-docs to inspect whether this project actually needs one-time structural adoption, migration, or cleanup first; if it does, keep the bundled references read-only, determine and explicitly confirm the repo model, produce a compact approval request with mandatory fields, create a preflight backup before the first approved mutation, and only then reorganize the project's docs and workspace structure using the canonical playbook."
