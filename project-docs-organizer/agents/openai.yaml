interface:
  display_name: "Project Docs Organizer"
  short_description: "Untangle project docs and workspace structure"
  default_prompt: "Use $project-docs-organizer to inspect whether this project actually needs one-time structural adoption, migration, or cleanup first; if it does, keep the bundled references read-only, keep discovery scoped to the target project unless the user explicitly approves an external reference, check whether git already exists, ask whether to keep the current git topology if it does, default to `single_repo` if it does not, and offer `split_src_repo` only when the user explicitly wants runtime isolation or there is a concrete deploy/ownership reason for it. Switch to `multi_runtime_split` only when the user explicitly wants multiple separately versioned runtimes under `src/` or the existing project already uses them. If the target project is empty or near-empty, do not infer architecture or naming from sibling directories or similarly named repos; use only the target project, the user's instructions, and explicitly approved references, and ask for missing product context when needed. Explicitly confirm the repo model, enumerate runtime git paths when the topology is split, decide and ask which documentation strategy to use for any existing docs, ask whether to create the recommended preflight backup, and produce a compact approval request with mandatory fields. Then stop and wait for the user's reply. Do not create, edit, rename, move, or delete project files before that reply. After approval, create the approved preflight backup before the first mutation, and only then reorganize the project's docs and workspace structure using the canonical playbook."
